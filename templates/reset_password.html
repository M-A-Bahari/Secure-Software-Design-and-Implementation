<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="wrapper">

<form method="POST">

<h1>Reset Password</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<p class="{{ category }}">{{ message }}</p>
{% endfor %}
{% endif %}
{% endwith %}

<div class="input-box">
<input type="password" name="password" id="password" placeholder="Password" required>
<i id="eye-password" class='bx bxs-hide' style="cursor:pointer;" onmousedown="peek('password')" onmouseup="hide('password')" onmouseleave="hide('password')"></i>
</div>

<div class="input-box">
<input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
<i id="eye-confirm_password" class='bx bxs-hide' style="cursor:pointer;" onmousedown="peek('confirm_password')" onmouseup="hide('confirm_password')" onmouseleave="hide('confirm_password')"></i>
</div>

<button type="submit" class="btn">Reset Password</button>

<div class="register-link">
<p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
</div>

</form>

</div>

<script>
function peek(id) {
    document.getElementById(id).type = "text";
    const eye = document.getElementById("eye-" + id);
    eye.classList.replace("bxs-hide", "bxs-show");
    setTimeout(() => hide(id), 500);
}
function hide(id) {
    document.getElementById(id).type = "password";
    const eye = document.getElementById("eye-" + id);
    eye.classList.replace("bxs-show", "bxs-hide");
}
</script>

</body>
</html>
